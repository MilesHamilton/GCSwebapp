# One command to run the fleet: `docker compose up --build` -> gateway on :8000 with
# a fleet of producer containers behind it (Milestone 4 Phase 10). The web dev server
# runs on the HOST by default (`npm --prefix apps/web run dev`) — WSL2 bind-mount
# file-watching is slow, so host HMR is far snappier. The browser reaches the
# containerized gateway at ws://localhost:8000/ws with no code change.
# Any requirements.txt / Dockerfile change needs `docker compose up --build` (or
# `docker compose build`): the bind mount hot-reloads source but NEVER picks up new
# image-baked deps, so a plain `up` would run a stale image (e.g. missing `websockets`)
# and every producer would die at import with no obvious cause. GATEWAY_URL is left to
# the code default (ws://gateway:8000/ingest) on purpose: a per-service `environment:`
# block REPLACES the anchor's wholesale (YAML '<<' is shallow), so anything in the anchor
# would be silently dropped.

# Shared producer definition. build+image so the image is built once and reused by all
# three vehicles; each service only adds its own VEHICLE_ID + start pose.
x-producer: &producer
  build: ./apps/api
  image: gcs-producer
  restart: unless-stopped # survive a daemon/host restart; a down container can't self-reconnect
  depends_on:
    - gateway
  volumes:
    - ./apps/api:/app # live edits -> uvicorn --reload picks them up
    - /app/.venv # anonymous volume: don't let the host .venv shadow the image's deps

services:
  # The fan-in gateway: owns host :8000 (the browser's /ws) and accepts producers on
  # /ingest. Pure relay — no sim, no clock.
  gateway:
    build: ./apps/gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./apps/gateway:/app
      - /app/.venv

  # --- the fleet: distinct start pose + loiter center + altitude so the aircraft are
  # visually separable (they don't converge on one ring). All start inside the R-1 DCA
  # zone. EXACTLY ONE producer is uav-01 — the browser sends no vehicleId yet (Phase 11),
  # so every command defaults to 'uav-01'; without it, commands would be unroutable.
  uav-01: # defaults reproduce today's single-vehicle DCA behavior exactly
    <<: *producer
    environment:
      - VEHICLE_ID=uav-01

  uav-02:
    <<: *producer
    environment:
      - VEHICLE_ID=uav-02
      - START_LAT=38.87
      - START_LNG=-77.00
      - START_HEADING_DEG=270
      - START_ALT_M=900
      - LOITER_LAT=38.87
      - LOITER_LNG=-77.02

  uav-03:
    <<: *producer
    environment:
      - VEHICLE_ID=uav-03
      - START_LAT=38.82
      - START_LNG=-77.06
      - START_HEADING_DEG=45
      - START_ALT_M=1300
      - LOITER_LAT=38.83
      - LOITER_LNG=-77.05

  # Runtime spawn/despawn control plane (Phase 11): same image, runs simhost:app instead
  # of main:app. The operator panel calls its host port (8001) to add/remove vehicles at
  # runtime; spawned sims dial the gateway like any producer, so they need no new container.
  sim-host:
    <<: *producer
    command: ["uvicorn", "simhost:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8001:8000"

  # Opt-in containerized web (mainly for a clone-and-run demo, not day-to-day dev):
  #   docker compose --profile full-container up
  web:
    profiles: ["full-container"]
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - /app/node_modules # keep the container's node_modules, don't mask with the host's
    env_file:
      - ./apps/web/.env # VITE_MAPBOX_TOKEN (public pk. token)
    environment:
      - CHOKIDAR_USEPOLLING=true # WSL2/Docker file-watch fallback for Vite HMR
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
